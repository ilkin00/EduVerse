# HTTP to HTTPS Redirect - Tüm domainler için
server {
    listen 80;
    server_name api.eduvers.site app.eduvers.site eduvers.site admin.eduvers.site;
    return 301 https://$server_name$request_uri;
}

# HTTPS - API Backend (api.eduvers.site)
server {
    listen 443 ssl;
    server_name api.eduvers.site;

    # SSL Sertifikaları
    ssl_certificate /etc/letsencrypt/live/api.eduvers.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.eduvers.site/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    access_log /var/log/nginx/api-access.log;
    error_log /var/log/nginx/api-error.log;

    # Swagger UI
    location /docs {
        proxy_pass http://eduverse-backend:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redoc UI
    location /redoc {
        proxy_pass http://eduverse-backend:8000/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # OpenAPI JSON
    location /openapi.json {
        proxy_pass http://eduverse-backend:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API v1 endpoints
    location /api/v1/ {
        proxy_pass http://eduverse-backend:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API root
    location /api/ {
        proxy_pass http://eduverse-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # WebSocket
    location /ws/ {
        proxy_pass http://eduverse-backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
    
    # Health check
    location /health {
        proxy_pass http://eduverse-backend:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Ana lokasyon - root path
    location / {
        proxy_pass http://eduverse-backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


# HTTPS - Mobile App (app.eduvers.site)
server {
    listen 443 ssl;
    server_name app.eduvers.site;

    ssl_certificate /etc/letsencrypt/live/api.eduvers.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.eduvers.site/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/mobile-access.log;
    error_log /var/log/nginx/mobile-error.log;

    # Expo Web / Mobile App
    location / {
        proxy_pass http://eduverse-mobile:8081/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cache-Control "no-store";  # ✅ Cache engellendi
	
	# Yeni eklenen satırlar
	proxy_buffering off;
	proxy_request_buffering off;
	proxy_max_temp_file_size 0;
    }

    # Expo SockJS WebSocket desteği
    location /sockjs-node/ {
        proxy_pass http://eduverse-mobile:8081/sockjs-node/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cache-Control "no-store";  # ✅ Cache engellendi
    }
}

# HTTPS - Web App (eduvers.site)
server {
    listen 443 ssl;
    server_name eduvers.site;

    # SSL Sertifikaları
    ssl_certificate /etc/letsencrypt/live/api.eduvers.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.eduvers.site/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/web-access.log;
    error_log /var/log/nginx/web-error.log;

    # Web app build klasörü (eğer varsa)
    root /var/www/web-app/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # API isteklerini backend'e yönlendir
    location /api/ {
        proxy_pass http://eduverse-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS - Adminer (admin.eduvers.site)
server {
    listen 443 ssl;
    server_name admin.eduvers.site;

    # SSL Sertifikaları
    ssl_certificate /etc/letsencrypt/live/api.eduvers.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.eduvers.site/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/admin-access.log;
    error_log /var/log/nginx/admin-error.log;

    location / {
        proxy_pass http://eduverse-adminer:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
