services:
  postgres:
    image: postgres:15-alpine
    container_name: eduverse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eduverse_user
      POSTGRES_PASSWORD: EduVerse2026!
      POSTGRES_DB: eduverse_db
      TZ: Europe/Istanbul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - eduverse-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduverse_user -d eduverse_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eduverse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - eduverse-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: eduverse-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=eduverse_user
      - POSTGRES_PASSWORD=EduVerse2026!
      - POSTGRES_DB=eduverse_db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=eduverse-gizli-anahtar-2026
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eduverse-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  nginx:
    image: nginx:alpine
    container_name: eduverse-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/web-app/build:/var/www/web-app/build:ro
      - ./nginx/logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - mobile-app
    networks:
      - eduverse-network

  adminer:
    image: adminer:latest
    container_name: eduverse-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - eduverse-network
    depends_on:
      - postgres

  mobile-app:
    build: 
      context: ./frontend/mobile
      dockerfile: Dockerfile
    container_name: eduverse-mobile
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      - EXPO_PUBLIC_API_URL=https://api.eduvers.site
      - EXPO_PUBLIC_WEB_URL=https://eduvers.site
      - REACT_NATIVE_PACKAGER_HOSTNAME=0.0.0.0
      - NODE_ENV=development
    volumes:
      - ./frontend/mobile:/app
      - /app/node_modules
    networks:
      - eduverse-network
    stdin_open: true
    tty: true

networks:
  eduverse-network:
    driver: bridge
    name: eduverse-network

volumes:
  postgres_data:
    name: eduverse-postgres-data
  redis_data:
    name: eduverse-redis-data
